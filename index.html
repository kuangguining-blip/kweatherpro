    // ============ 构建全局城市索引（用于跨地区搜索） ============
    function buildGlobalIndex() {
        const index = [];
        Object.entries(AIRPORTS_DB).forEach(([continentKey, continent]) => {
            Object.entries(continent.regions).forEach(([regionName, cities]) => {
                if (cities.__divider__) return;
                cities.forEach(c => {
                    index.push({ ...c, continentKey, regionName });
                });
            });
        });
        return index;
    }
    const globalCityIndex = buildGlobalIndex();

    // ============ 渲染城市列表 ============
    function renderCityGrid() {
        const container = document.getElementById('cityGrid');
        const continent = document.getElementById('continentSelect').value;
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        let html = '';
        
        if (search) {
            // 搜索模式：跨所有大洲搜索，支持中英文
            const searchLower = search.toLowerCase().trim();
            // 尝试英文别名映射 → 中文城市名
            const mappedChinese = CITY_ALIASES[searchLower] || '';
            
            const results = globalCityIndex.filter(c => {
                const cityLower = c.city.toLowerCase();
                // 1. 中文城市名匹配
                if (cityLower.includes(searchLower)) return true;
                // 2. 英文别名映射后匹配
                if (mappedChinese && cityLower.includes(mappedChinese.toLowerCase())) return true;
                // 3. 机场代码/英文名直接匹配
                if (c.airports.some(a =>
                    a.code.toLowerCase().includes(searchLower) ||
                    a.name.toLowerCase().includes(searchLower)
                )) return true;
                // 4. 遍历别名表，看搜索词是否命中某个别名对应的城市
                for (const [alias, chName] of Object.entries(CITY_ALIASES)) {
                    if (alias.includes(searchLower) || searchLower.includes(alias)) {
                        if (cityLower.includes(chName.toLowerCase())) return true;
                    }
                }
                return false;
            });
            
            if (results.length === 0) {
                container.innerHTML = `<div style="padding:1rem;text-align:center;color:var(--text-muted)">${t().noResult}</div>`;
                return;
            }
            
            html += `<div class="sub-region-divider">${t().searchResults} (${results.length})</div>`;
            html += '<div class="city-row">';
            
            results.forEach(cityData => {
                const isSelected = state.selectedCity?.city === cityData.city && state.selectedCity?.continent === cityData.continentKey;
                const aptCodes = cityData.airports.map(a => a.code).join('/');
                const aptNames = cityData.airports.map(a => a.name).join('/');
                const continentName = AIRPORTS_DB[cityData.continentKey]?.name || cityData.continentKey;
                
                html += `
                    <div class="city-btn ${isSelected ? 'active' : ''}" 
                         onclick="selectCityGlobal('${cityData.city}', '${cityData.continentKey}')"
                         title="${cityData.regionName} · ${continentName} — ${aptNames}">
                        <div class="city-btn-name">${cityData.city}</div>
                        <div class="city-btn-airports">${aptCodes}</div>
                    </div>
                `;
            });
            
            html += '</div>';
        } else {
            // 浏览模式：按当前选中的大洲显示
            const data = AIRPORTS_DB[continent];
            if (!data) return;
            
            Object.entries(data.regions).forEach(([regionName, cities]) => {
                if (cities.__divider__) {
                    html += `<div class="sub-region-divider">${cities.label}</div>`;
                    return;
                }
                
                if (cities.length === 0) return;
                
                html += `<div class="region-title">${regionName} (${cities.length})</div>`;
                html += '<div class="city-row">';
                
                cities.forEach(cityData => {
                    const isSelected = state.selectedCity?.city === cityData.city && state.selectedCity?.continent === continent;
                    const aptCodes = cityData.airports.map(a => a.code).join('/');
                    const aptNames = cityData.airports.map(a => a.name).join('/');
                    
                    html += `
                        <div class="city-btn ${isSelected ? 'active' : ''}" 
                             onclick="selectCityGlobal('${cityData.city}', '${continent}')"
                             title="${aptNames}">
                            <div class="city-btn-name">${cityData.city}</div>
                            <div class="city-btn-airports">${aptCodes}</div>
                        </div>
                    `;
                });
                
                html += '</div>';
            });
        }
        
        container.innerHTML = html || `<div style="padding:1rem;text-align:center;color:var(--text-muted)">${t().noResult}</div>`;
    }

    // ============ 选择城市（支持跨地区） ============
    async function selectCityGlobal(cityName, continentKey) {
        const data = AIRPORTS_DB[continentKey];
        if (!data) return;
        
        const cityData = Object.values(data.regions).flat().find(c => c.city === cityName);
        if (!cityData) return;
        
        state.selectedCity = { city: cityName, continent: continentKey, ...cityData };
        state.selectedAirport = cityData.airports[0];
        
        renderCityGrid();
        await renderWeather();
    }

    // ============ 选择机场 ============
    async function selectAirport(apt) {
        state.selectedAirport = apt;
        await renderWeather();
    }

    // ============ 获取指定机场天气数据（Open-Meteo API 直连） ============
    let _apiErrorMsg = '';

    async function fetchWeatherForApt(apt) {
        const cacheKey = `${apt.code}`;
        const cached = state.weatherCache.get(cacheKey);
        if (cached && Date.now() - cached.time < 600000) return cached.data; // 10分钟缓存

        const params = new URLSearchParams({
            latitude: apt.lat,
            longitude: apt.lon,
            current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure',
            hourly: 'temperature_2m,weather_code,precipitation_probability,precipitation',
            daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max',
            timezone: 'auto',
            forecast_days: '7'
        });

        // 尝试当前端点，失败则自动切换到下一个
        for (let attempt = 0; attempt < OMA_ENDPOINTS.length; attempt++) {
            const url = `${omaBaseURL}?${params}`;
            try {
                const ctrl = new AbortController();
                const timer = setTimeout(() => ctrl.abort(), 10000);
                const res = await fetch(url, { signal: ctrl.signal });
                clearTimeout(timer);
                if (res.ok) {
                    const data = await res.json();
                    state.weatherCache.set(cacheKey, { data, time: Date.now() });
                    _apiErrorMsg = '';
                    return data;
                } else {
                    console.warn(`Open-Meteo 端点 ${omaBaseURL} 返回 ${res.status}，尝试下一个...`);
                }
            } catch (e) {
                console.warn(`Open-Meteo 端点 ${omaBaseURL} 请求失败:`, e.message);
            }
            // 切换到下一个端点
            omaEndpointIdx = (omaEndpointIdx + 1) % OMA_ENDPOINTS.length;
            omaBaseURL = OMA_ENDPOINTS[omaEndpointIdx];
        }

        _apiErrorMsg = t().apiError;
        return null;
    }

    // ============ 渲染单个机场天气卡片（Open-Meteo 数据） ============
    function renderAirportCard(apt, omaData, now) {
        if (!omaData || !omaData.current) {
            const errMsg = _apiErrorMsg || '数据加载失败，请稍后重试';
            return `
            <div class="airport-section">
                <div class="airport-section-header">
                    <span class="apt-badge">${apt.code}</span>
                    <span class="apt-name">✈️ ${apt.name}</span>
                </div>
                <div class="airport-section-body">
                    <div style="color:var(--text-muted);text-align:center;padding:1rem">
                        ${errMsg}
                    </div>
                </div>
            </div>`;
        }

        const cur = omaData.current;
        const curTemp = cur.temperature_2m;
        const curFeel = cur.apparent_temperature;
        const curHumidity = cur.relative_humidity_2m;
        const curWind = cur.wind_speed_10m; // km/h
        const curWindDeg = cur.wind_direction_10m || 0;
        const curPressure = cur.surface_pressure;
        const curCode = cur.weather_code;
        const curSym = getWmo(curCode);

        const windDisplay = state.temperatureUnit === 'fahrenheit'
            ? `${Math.round(curWind * 0.621371)} mph` : `${Math.round(curWind)} km/h`;

        // 逐小时预报（24小时）
        const hourly = omaData.hourly;
        const nowIdx = hourly.time.findIndex(t => new Date(t) >= now) || 0;
        const startIdx = Math.max(0, nowIdx);
        const hourlyHTML = Array.from({length: 24}, (_, i) => {
            const idx = startIdx + i;
            if (idx >= hourly.time.length) return '';
            const hDate = new Date(hourly.time[idx]);
            const hTemp = hourly.temperature_2m[idx];
            const hCode = hourly.weather_code[idx];
            const hSym = getWmo(hCode);
            const hPrecip = hourly.precipitation_probability[idx];
            const h = hDate.getHours();
            const timeLabel = i === 0 ? '现在' : `${String(h).padStart(2, '0')}:00`;
            return `<div class="apt-hour ${i===0?'now':''}">
                <div class="apt-hour-time">${timeLabel}</div>
                <div class="apt-hour-icon">${hSym.emoji}</div>
                <div class="apt-hour-temp">${fmtTemp(hTemp)}</div>
                ${hPrecip > 0 ? `<div style="font-size:0.55rem;color:var(--primary)">💧${hPrecip}%</div>` : ''}
            </div>`;
        }).join('');

        // 每日预报
        const daily = omaData.daily;
        const dailyCount = Math.min(daily.time.length, 7);
        const days = ['日','一','二','三','四','五','六'];

        const dailyHTML = dailyCount > 0 ? `<div class="apt-daily-grid" style="grid-template-columns:repeat(${dailyCount}, 1fr)">` + Array.from({length: dailyCount}, (_, i) => {
            const dateObj = new Date(daily.time[i] + 'T00:00:00');
            const dateLabel = `${dateObj.getMonth()+1}/${dateObj.getDate()}`;
            const dayLabel = i === 0 ? '今天' : i === 1 ? '明天' : '周' + days[dateObj.getDay()];
            const maxT = daily.temperature_2m_max[i];
            const minT = daily.temperature_2m_min[i];
            const dSym = getWmo(daily.weather_code[i]);
            const precip = daily.precipitation_sum[i];
            const precipProb = daily.precipitation_probability_max[i];
            return `
            <div class="apt-daily-card ${i===0?'today':''}">
                <div class="apt-daily-card-day">${dayLabel}</div>
                <div class="apt-daily-card-date">${dateLabel}</div>
                <div class="apt-daily-card-icon">${dSym.emoji}</div>
                <div class="apt-daily-card-hi">↑${fmtTemp(maxT)}</div>
                <div class="apt-daily-card-lo">↓${fmtTemp(minT)}</div>
                <div class="apt-daily-card-precip">${precip > 0 ? '💧'+precip.toFixed(1)+'mm' : ''}${precipProb > 30 ? (precip > 0 ? ' ' : '') + precipProb + '%' : ''}</div>
            </div>`;
        }).join('') + `</div>` : '';

        return `
        <div class="airport-section">
            <div class="airport-section-header">
                <span class="apt-badge">${apt.code}</span>
                <span class="apt-name">✈️ ${apt.name}</span>
            </div>
            <div class="airport-section-body">
                <div class="apt-current-row">
                    <div class="apt-temp-big">${fmtTemp(curTemp)}</div>
                    <div>
                        <div class="apt-desc">${curSym.emoji} ${curSym.zh}</div>
                        <div class="apt-feel">体感 ${fmtTemp(curFeel)}</div>
                    </div>
                </div>
                <div class="apt-meta">
                    <div class="apt-meta-item"><div class="apt-meta-label">💧 湿度</div><div class="apt-meta-val">${curHumidity ?? '--'}%</div></div>
                    <div class="apt-meta-item"><div class="apt-meta-label">🌬️ 风速</div><div class="apt-meta-val">${windDisplay}</div></div>
                    <div class="apt-meta-item"><div class="apt-meta-label">💨 风向</div><div class="apt-meta-val">${getWD(curWindDeg)}</div></div>
                    <div class="apt-meta-item"><div class="apt-meta-label">🌡️ 气压</div><div class="apt-meta-val">${curPressure ? Math.round(curPressure) : '--'}hPa</div></div>
                </div>
                <div class="apt-meta" style="margin-top:0.3rem">
                    <div class="apt-meta-item"><div class="apt-meta-label">📅 预报</div><div class="apt-meta-val">${dailyCount}天</div></div>
                    <div class="apt-meta-item"><div class="apt-meta-label">📡 更新</div><div class="apt-meta-val" style="font-size:0.55rem">${cur.time ? new Date(cur.time).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) : '--'}</div></div>
                </div>
                <div class="apt-hourly">${hourlyHTML}</div>
                <div class="apt-daily">${dailyHTML}</div>
            </div>
        </div>`;
    }

    // ============ 渲染天气（多机场并排独立显示） ============
    async function renderWeather() {
        const container = document.getElementById('weatherContent');
        const city = state.selectedCity;
        const airports = city.airports;
        const now = new Date();

        container.innerHTML = `<div class="loading"><div class="spinner"></div><p>${t().loading(city.city)}</p></div>`;

        // 并行拉取所有机场数据
        const results = await Promise.all(airports.map(apt => fetchWeatherForApt(apt)));

        let html = `
            <div class="current-weather">
                <div class="current-header">
                    <div>
                        <div class="current-location">${city.city}</div>
                        <div class="current-airport">✈️ ${airports.length > 1 ? t().airports(airports.length) : airports[0].name + ' (' + airports[0].code + ')'}</div>
                    </div>
                    <div class="current-time">${now.toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en-US',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
                </div>
            </div>
            <div class="multi-airport-wrapper">`;

        airports.forEach((apt, i) => {
            html += renderAirportCard(apt, results[i], now);
        });

        html += `</div>`;
        container.innerHTML = html;
    }

            state.selectedAirport = null;
            renderCityGrid();
            document.getElementById('weatherContent').innerHTML = `
                <div class="no-selection">
                    <div class="no-selection-icon">🌤️</div>
                    <h2>${t().selectCity}</h2>
                    <p>${t().selectCityHint}</p>
                </div>
            `;
        });

        document.querySelectorAll('.unit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.temperatureUnit = btn.dataset.unit;
                // 温度转换在前端完成（API始终返回摄氏度），无需清空缓存
                if (state.selectedAirport) renderWeather();
            });
        });

        // 字体大小切换
        const savedFontSize = localStorage.getItem('kwp-font-size') || 'md';
        document.body.classList.add('font-' + savedFontSize);
        document.querySelectorAll('.font-size-btn').forEach(b => {
            if (b.dataset.size === savedFontSize) b.classList.add('active');
            else b.classList.remove('active');
        });
        document.querySelectorAll('.font-size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.font-size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const size = btn.dataset.size;
                document.body.classList.remove('font-sm', 'font-md', 'font-lg');
                document.body.classList.add('font-' + size);
                localStorage.setItem('kwp-font-size', size);
            });
        });

        // 10分钟自动刷新
        setInterval(() => {
            if (state.selectedAirport) {
                state.weatherCache.clear();
                renderWeather();
                document.getElementById('lastUpdate').textContent = t().updatePrefix + new Date().toLocaleTimeString(currentLang === 'zh' ? 'zh-CN' : 'en-US');
            }
        }, 600000);

        document.getElementById('lastUpdate').textContent = t().updatePrefix + new Date().toLocaleTimeString(currentLang === 'zh' ? 'zh-CN' : 'en-US');

        // 解析 URL hash，分享链接直接定位城市
        (function parseHash() {
            const hash = location.hash.replace('#', '');
            if (!hash) return;
            const [citySlug, aptCode] = hash.split('|');
            if (!citySlug) return;
            // 在所有城市中查找
            for (const [regionName, cities] of Object.entries(weatherData)) {
                for (const city of cities) {
                    if (encodeURIComponent(city.city) === citySlug || city.city === decodeURIComponent(citySlug)) {
                        state.selectedCity = city;
                        state.selectedAirport = aptCode
                            ? city.airports.find(a => a.code === aptCode) || city.airports[0]
                            : city.airports[0];
                        renderCityGrid();
                        renderWeather();
                        // 切换到大洲
                        const regionKeys = { '亚洲': 'asia', '中东': 'middle-east', '欧洲': 'europe', '北美洲': 'north-america', '南美洲': 'south-america', '大洋洲': 'oceania', '非洲': 'africa' };
                        for (const [cn, key] of Object.entries(regionKeys)) {
                            if (weatherData[cn] === cities || regionName === cn) {
                                document.getElementById('continentSelect').value = key;
                                break;
                            }
                        }
                        return;
                    }
                }
            }
        })();

        // ============ 语言切换 ============
        function applyLang() {
            const lang = currentLang;
            // 搜索框 placeholder
            document.getElementById('searchInput').placeholder = t().searchPlaceholder;
            // 更新时间
            document.getElementById('lastUpdate').textContent = t().updatePrefix + new Date().toLocaleTimeString(lang === 'zh' ? 'zh-CN' : 'en-US');
            // 字体大小按钮文字
            const fontBtns = document.querySelectorAll('.font-size-btn');
            const sizes = t().fontSizes;
            fontBtns.forEach((b, i) => { if (sizes[i]) b.textContent = sizes[i]; });
            // 大洲下拉选项
            const select = document.getElementById('continentSelect');
            const continentMap = t().continents;
            Array.from(select.options).forEach(opt => {
                if (continentMap[opt.value]) opt.textContent = continentMap[opt.value];
            });
            // footer
            document.querySelector('.footer').innerHTML = t().footer;
            // no-selection 初始状态
            const noSelTitle = document.getElementById('noSelTitle');
            const noSelHint = document.getElementById('noSelHint');
            if (noSelTitle) noSelTitle.textContent = t().selectCity;
            if (noSelHint) noSelHint.textContent = t().selectCityHint;
            // 语言按钮高亮
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === lang);
            });
            // 分享按钮文字
            const shareBtnText = document.getElementById('shareBtnText');
            if (shareBtnText) shareBtnText.textContent = lang === 'zh' ? '分享' : 'Share';
            // 城市列表重新渲染（更新大洲标签等）
            renderCityGrid();
            // 如果已选城市，重新渲染天气
            if (state.selectedCity) renderWeather();
        }

        // 初始化语言状态
        document.querySelectorAll('.lang-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.lang === currentLang);
        });
        applyLang();

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentLang = btn.dataset.lang;
                localStorage.setItem('kwp-lang', currentLang);
                applyLang();
            });
        });
    }

    document.addEventListener('DOMContentLoaded', init);

    // 注册 Service Worker（PWA 支持）
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('✅ Service Worker 注册成功');
            }).catch(err => {
                console.warn('Service Worker 注册失败:', err);
            });
        });
    }
    </script>
    <script>
    // ============ 分享到微信功能 ============
    (function() {
        const shareBtn = document.getElementById('shareBtn');
        const shareModal = document.getElementById('shareModal');
        const shareClose = document.getElementById('shareClose');
        const shareLinkInput = document.getElementById('shareLinkInput');
        const shareCopyBtn = document.getElementById('shareCopyBtn');
        const shareQrDiv = document.getElementById('shareQr');
        const shareTitle = document.getElementById('shareTitle');
        const shareTip = document.getElementById('shareTip');

        function getShareUrl() {
            if (state.selectedCity && state.selectedAirport) {
                const citySlug = encodeURIComponent(state.selectedCity.city);
                const code = state.selectedAirport.code;
                return location.origin + location.pathname + '#' + citySlug + '|' + code;
            }
            return location.href;
        }

        function updateShareLang() {
            const lang = currentLang || 'zh';
            if (shareTitle) shareTitle.textContent = lang === 'zh' ? '分享天气页面' : 'Share Weather';
            if (shareCopyBtn && !shareCopyBtn.classList.contains('copied')) {
                shareCopyBtn.textContent = lang === 'zh' ? '复制链接' : 'Copy Link';
            }
            if (shareTip) shareTip.textContent = lang === 'zh' ? '微信扫码打开，或复制链接发送给好友' : 'Scan QR code in WeChat, or copy the link';
        }

        if (shareBtn) {
            shareBtn.addEventListener('click', () => {
                const url = getShareUrl();
                shareLinkInput.value = url;
                // 使用 Google Chart API 生成二维码（稳定可靠）
                const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url) + '&bgcolor=ffffff&color=1a365d&margin=10';
                shareQrDiv.innerHTML = '<img src="' + qrUrl + '" alt="QR Code" style="border-radius:8px;width:200px;height:200px;" />';
                updateShareLang();
                shareModal.classList.add('show');
            });
        }
        if (shareClose) {
            shareClose.addEventListener('click', () => shareModal.classList.remove('show'));
        }
        if (shareModal) {
            shareModal.addEventListener('click', (e) => {
                if (e.target === shareModal) shareModal.classList.remove('show');
            });
        }
        if (shareCopyBtn) {
            shareCopyBtn.addEventListener('click', () => {
                const url = shareLinkInput.value;
                navigator.clipboard.writeText(url).then(() => {
                    shareCopyBtn.textContent = currentLang === 'zh' ? '已复制 ✓' : 'Copied ✓';
                    shareCopyBtn.classList.add('copied');
                    setTimeout(() => {
                        shareCopyBtn.textContent = currentLang === 'zh' ? '复制链接' : 'Copy Link';
                        shareCopyBtn.classList.remove('copied');
                    }, 1500);
                }).catch(() => {
                    shareLinkInput.select();
                    document.execCommand('copy');
                    shareCopyBtn.textContent = currentLang === 'zh' ? '已复制 ✓' : 'Copied ✓';
                });
            });
        }
    })();
    </script>
    </script>
